# SDD hard gate — paste into your CI pipeline (GitHub Actions example)
# Blocks PRs that modify approved test files without going through /sdd.test --refine
#
# Requires: bash, jq, git (available on ubuntu-latest runners)

- name: SDD guard — approved tests immutable
  if: github.event_name == 'pull_request' || github.event_name == 'push'
  run: |
    set -euo pipefail
    ROOT="${GITHUB_WORKSPACE:-.}"
    if [ -f "$ROOT/development-agents/framework/tools/guard-approved-tests.sh" ]; then
      GUARD="$ROOT/development-agents/framework/tools/guard-approved-tests.sh"
    elif [ -f "$ROOT/framework/tools/guard-approved-tests.sh" ]; then
      GUARD="$ROOT/framework/tools/guard-approved-tests.sh"
    else
      echo "SKIP: development-agents guard script not installed"
      exit 0
    fi
    bash "$GUARD" check --root "$ROOT" --json
